<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      position: relative;
      width: {{ width }}px;
      height: {{ height }}px;
      overflow: hidden;
    }

    /* 背景样式 */
    .background {
      position: absolute;
      inset: 0;
      {{ background_style }}
    }

    /* 装饰元素 - 光晕 */
    {{#show_glow}}
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    {{/show_glow}}

    /* 设备边框 */
    .device-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: {{ frame_width }}px;
      height: {{ frame_height }}px;
      background: #000;
      border-radius: {{ border_radius }}px;
      padding: {{ padding }}px;
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 0 {{ border_width }}px {{ border_color }};
    }

    {{#show_device_frame}}
    .device-notch {
      position: absolute;
      top: {{ padding }}px;
      left: 50%;
      transform: translateX(-50%);
      width: {{ notch_width }}px;
      height: 30px;
      background: #000;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      z-index: 10;
    }
    {{/show_device_frame}}

    .device-screen {
      width: 100%;
      height: 100%;
      border-radius: {{ screen_radius }}px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }

    .device-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 可选：标题文字 */
    .caption {
      position: absolute;
      bottom: {{ caption_bottom }}px;
      left: 50%;
      transform: translateX(-50%);
      font-size: {{ font_size }}px;
      font-weight: 600;
      color: {{ text_color }};
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      z-index: 5;
    }

    /* 可选：装饰性阴影层 */
    {{#show_shadow_overlay}}
    .shadow-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
      z-index: 4;
    }
    {{/show_shadow_overlay}}
  </style>
</head>
<body>
  <div class="container">
    <!-- 背景 -->
    <div class="background"></div>

    {{#show_glow}}
    <div class="glow"></div>
    {{/show_glow}}

    {{#show_shadow_overlay}}
    <div class="shadow-overlay"></div>
    {{/show_shadow_overlay}}

    <!-- 设备框 -->
    <div class="device-frame">
      {{#show_device_frame}}
      <div class="device-notch"></div>
      {{/show_device_frame}}

      <div class="device-screen">
        <img src="{{ image_url }}" alt="Screenshot" />
      </div>
    </div>

    <!-- 可选标题 -->
    {{#caption}}
    <div class="caption">{{ caption }}</div>
    {{/caption}}
  </div>
</body>
</html>
